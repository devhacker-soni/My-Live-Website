<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="aboutme.html">About</a>
    <a href="form.html">Contact</a>
</nav>

    <div class="form-container">
         <h1> Form </h1>
         <form method ="post" onsubmit="formSubmit(event)">
            <label for="name">Name</label>
            <input type="text" id="name"> 
            <label for="email">Email</label>
            <input type="email" id="email"> 
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" maxlength="10">
            <label for="city">City</label>
            <select id="city">

                <option value="">Select City</option>
                <option value="mumbai">Mumbai</option>
                <option value="pune">Pune</option>
                <option value="nagpur">Nagpur</option>
            </select>
            <label for="state">State</label>
            <select id="state">
                <option value="maharashtra">Maharashtra</option>
                <option value="gujarat">Gujarat</option>
                <option value="punjab">Punjab</option>
            </select>
            <label for="interest">Interested Field</label>
            <input type="text" id="interest" placeholder="e.g.....ethical hacking, Web developer">
    
            <button type="submit">Submit</button>
            <p id="success-msg" style="display:none; color:green; font-family:'Poppins',sans-serif;">
    ✓ Form submitted successfully!
</p>

         </form>


    </div>
<script src="script.js"></script>
</body>

</html>
